<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#455a64"/></marker><style>.panel{fill:#fff;stroke:#90a4ae;stroke-width:2;rx:10}.hot{fill:#eaf4ff;stroke:#1565c0;stroke-width:2;rx:10}.t{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#111;text-anchor:middle}.s{font:14px "Microsoft YaHei",Arial,sans-serif;fill:#333;text-anchor:middle}.m{font:14px Consolas,"Microsoft YaHei",monospace;fill:#111}.l{stroke:#455a64;stroke-width:2;fill:none;marker-end:url(#a)}</style></defs>
  <rect x="50" y="70" width="250" height="280" class="panel"/><text x="175" y="110" class="t">原始 bank 名字</text><text x="84" y="155" class="m">I0: W v3</text><text x="84" y="195" class="m">I1: R v3</text><text x="84" y="235" class="m">I2: W v3</text><text x="84" y="275" class="m">I3: R v3</text><text x="175" y="322" class="s">名字相同，不等于版本相同</text>
  <path d="M300 210 H390" class="l"/>
  <rect x="390" y="70" width="300" height="280" class="hot"/><text x="540" y="110" class="t">BAT：版本命名</text><text x="430" y="155" class="m">I0: W v3 -> a16</text><text x="430" y="195" class="m">I1: R v3 -> a16</text><text x="430" y="235" class="m">I2: W v3 -> a18</text><text x="430" y="275" class="m">I3: R v3 -> a18</text><text x="540" y="322" class="s">读者捕获当前最新 alias</text>
  <path d="M690 210 H780" class="l"/>
  <rect x="780" y="70" width="290" height="280" class="panel"/><text x="925" y="110" class="t">Scoreboard：可读性</text><text x="820" y="158" class="m">alloc W a16: busy=1</text><text x="820" y="198" class="m">issue R a16: 等 busy=0</text><text x="820" y="238" class="m">complete a16: busy=0</text><text x="820" y="278" class="m">commit: 释放 alias 元数据</text><text x="925" y="322" class="s">只盯真实数据版本是否 ready</text>
</svg>
