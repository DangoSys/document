  <path d="M720 126 H756 V232 H790" class="l blue"/>
  <path d="M720 282 H790" class="l orange"/>
  <path d="M720 418 H756 V296 H790" class="l"/>

  <path d="M946 238 H980 V116 H1012" class="l blue"/>
  <path d="M946 258 H1012" class="l"/>
  <path d="M946 278 H980 V360 H1012" class="l orange"/>

  <rect x="790" y="386" width="156" height="52" class="gate"/>
  <text x="868" y="407" class="t">row order</text>
  <text x="868" y="428" class="s">row0 → row1 → row2</text>

  <path d="M395 182 V226" class="l orange"/>
  <path d="M395 338 V382" class="l orange"/>
</svg>
