<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455a64"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c56a00"/>
    </marker>
    <style>
      .bg { fill:#fafafa; stroke:#d8dee3; stroke-width:2; rx:12; }
      .active { fill:#eaf4ff; stroke:#1565c0; stroke-width:2.4; rx:10; }
      .next { fill:#fff7e8; stroke:#c56a00; stroke-width:2.2; rx:10; }
      .later { fill:#f5f5f5; stroke:#90a4ae; stroke-width:2; rx:10; }
      .slot { fill:#fff; stroke:#90a4ae; stroke-width:1.8; rx:8; }
      .slotHot { fill:#ffffff; stroke:#1565c0; stroke-width:2.2; rx:8; }
      .slotWait { fill:#ffffff; stroke:#c56a00; stroke-width:2.1; rx:8; }
      .exec { fill:#ffffff; stroke:#455a64; stroke-width:2; rx:8; }
      .scheduler { fill:#ffffff; stroke:#1565c0; stroke-width:2.3; rx:10; }
      .gate { fill:#ffffff; stroke:#263238; stroke-width:2; rx:8; }
      .t { font:700 16px "Microsoft YaHei", Arial, sans-serif; fill:#111; text-anchor:middle; }
      .s { font:13px "Microsoft YaHei", Arial, sans-serif; fill:#455a64; text-anchor:middle; }
      .l { stroke:#455a64; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .blue { stroke:#1565c0; marker-end:url(#arrow-blue); }
      .orange { stroke:#c56a00; marker-end:url(#arrow-orange); }
      .dash { stroke-dasharray:7 6; }
    </style>
  </defs>

  <rect x="24" y="24" width="1132" height="472" class="bg"/>

  <rect x="70" y="70" width="650" height="112" class="active"/>
  <text x="110" y="105" class="t">row0</text>
  <text x="110" y="131" class="s">active</text>
  <rect x="170" y="96" width="118" height="58" class="slotHot"/>
  <text x="229" y="120" class="t">slot0</text>
  <text x="229" y="142" class="s">MVIN</text>
  <rect x="310" y="96" width="118" height="58" class="slotHot"/>
  <text x="369" y="120" class="t">slot1</text>
  <text x="369" y="142" class="s">PRELOAD</text>
  <rect x="450" y="96" width="118" height="58" class="slotHot"/>
